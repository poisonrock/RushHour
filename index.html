<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>오늘도 출근이다 - Mobile Retro Game</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', monospace;
            color: #fff;
            overflow: hidden;
        }
        /* 모바일 9:16 프레임 컨테이너 */
        #game-container {
            width: 100%;
            max-width: 414px;
            height: 100%;
            max-height: 736px;
            background-color: #000;
            border: 4px solid #444;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* 타이틀 화면 스타일 */
        #title-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('image_0.png'); /* 제공된 이미지 사용 */
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* 하단에 문구 배치 */
            align-items: center;
            padding-bottom: 100px; /* 하단 여백 */
            cursor: pointer; /* 클릭 가능한 커서 */
        }

        /* 반짝이는 글자 애니메이션 */
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        #start-text {
            font-size: 20px;
            color: white;
            text-shadow: 2px 2px 4px black; /* 가독성을 위한 그림자 */
            animation: blink 1s infinite; /* 1초 주기로 깜빡임 */
            font-weight: bold;
            pointer-events: none; /* 텍스트 자체 클릭 방지 */
        }

        /* 게임 플레이 화면 (초기엔 숨김) */
        #game-play-screen {
            display: none; /* 게임 시작 전에는 숨김 */
            flex-direction: column;
            height: 100%;
        }

        /* 상단 헤더 영역 */
        #header {
            height: 10%;
            background-color: #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            font-size: 14px;
            border-bottom: 2px solid #555;
        }
        /* 게임 메인 화면 영역 */
        #screen {
            flex: 1;
            background-color: #000;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        /* 하단 조작계 영역 */
        #controls {
            height: 25%;
            background-color: #2a2a2a;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px;
            border-top: 2px solid #555;
        }
        .btn {
            background-color: #555;
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px #222;
        }
        .btn:active {
            background-color: #777;
            transform: translateY(4px);
            box-shadow: 0 0 #222;
        }
        h2 { color: #f1c40f; margin-bottom: 10px; }
        p { font-size: 14px; line-height: 1.4; color: #ccc; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="title-screen" onclick="startGame()">
        <div id="start-text">Press the button to start</div> </div>

    <div id="game-play-screen">
        <div id="header">
            <span id="stage-title">STAGE 1</span>
            <span id="timer">TIME: 30</span>
        </div>

        <div id="screen">
            <h2 id="screen-heading">지옥의 콩나물시루</h2>
            <p id="screen-desc">좌우 버튼을 눌러 인파를 뚫고 탑승하세요!</p>
            <div id="game-content" style="margin: 20px 0; font-size: 24px; color: #2ecc71;">[ 캐릭터 & 인파 애니메이션 영역 ]</div>
        </div>

        <div id="controls">
            <button class="btn" id="btn-left" ontouchstart="handleAction('left')" onclick="handleAction('left')">◀ 좌측</button>
            <button class="btn" id="btn-action" ontouchstart="handleAction('action')" onclick="handleAction('action')">액션/연타</button>
            <button class="btn" id="btn-right" ontouchstart="handleAction('right')" onclick="handleAction('right')">우측 ▶</button>
        </div>
    </div>
</div>

<script>
    // 스테이지 데이터 정의
    const stages = [
        { id: 1, name: "STAGE 1: 만원 지하철 탑승", desc: "좌우 버튼과 연타로 인파를 헤치고 탑승하세요!" },
        { id: 2, name: "STAGE 2: 경복궁역 하차 서바이벌", desc: "샌드위치 객실 속에서 비집고 나와 문 앞으로 이동!" },
        { id: 3, name: "STAGE 3: 5초 광화문 전력 질주", desc: "버튼을 미친 듯이 연타하여 회사 로비로 돌진!" },
        { id: 4, name: "STAGE 4: 지옥의 4층 계단", desc: "좌우 버튼을 번갈아 터치해 빠르게 계단을 오르세요!" },
        { id: 5, name: "STAGE 5: 부장님의 스텔스 출근", desc: "부장님이 뒤돌았을 때 움직여 내 자리에 착석하세요!" }
    ];

    let currentStageIndex = 0;

    // 게임 시작 함수
    function startGame() {
        document.getElementById('title-screen').style.display = 'none'; // 타이틀 숨김
        document.getElementById('game-play-screen').style.display = 'flex'; // 게임 화면 표시
        currentStageIndex = 0; // 스테이지 초기화
        updateStageUI();
    }

    function updateStageUI() {
        const stage = stages[currentStageIndex];
        document.getElementById('stage-title').innerText = `STAGE ${currentStageIndex + 1}`;
        document.getElementById('screen-heading').innerText = stage.name;
        document.getElementById('screen-desc').innerText = stage.desc;
    }

    // 액션 버튼 핸들러 (스테이지별 상호작용 프로토타입)
    function handleAction(actionType) {
        console.log(`Action executed: ${actionType} in Stage ${currentStageIndex + 1}`);
        
        // 간단한 스테이지 순환 테스트 로직 (실제 개발 시 각 스테이지별 게임 루프 연결)
        if (actionType === 'action') {
            currentStageIndex = (currentStageIndex + 1) % stages.length;
            updateStageUI();
        }
        
        // 스테이지 5 클리어 시 타이틀로 돌아가는 로직 추가 예시
        if (currentStageIndex === stages.length - 1 && actionType === 'action') {
             if(confirm("출근 완료! 다시 시작하시겠습니까?")) {
                 location.reload();
             }
        }
    }
</script>

</body>
</html>
